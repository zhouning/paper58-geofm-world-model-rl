experiment:
  name: eurosat_geoadapter_benchmark
  dataset: eurosat
  dataset_root: ./data/eurosat
  epochs: 50
  batch_size: 64
  seeds: [42, 123, 456]

modalities:
  - preset: s2_full
  - preset: rgb
  - preset: rgb_sar
  - preset: gf2
  - preset: sar_only

methods:
  - name: linear_probe
    adapter: zero_pad
    peft: null
  - name: bitfit
    adapter: zero_pad
    peft: bitfit
  - name: houlsby
    adapter: zero_pad
    peft: houlsby
    bottleneck_dim: 64
  - name: lora_r8
    adapter: zero_pad
    peft: lora
    rank: 8
  - name: geoadapter
    adapter: geo_adapter
    peft: null

training:
  lr: 1.0e-3
  lr_peft: 1.0e-4
  scheduler: cosine
  weight_decay: 0.01

prithvi:
  pretrained: true
  checkpoint: null
