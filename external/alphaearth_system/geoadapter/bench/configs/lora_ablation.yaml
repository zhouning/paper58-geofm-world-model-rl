experiment:
  name: eurosat_lora_ablation
  dataset: eurosat
  dataset_root: ./data/eurosat
  epochs: 50
  batch_size: 64
  seeds: [42, 123, 456]

modalities:
  - preset: s2_full
  - preset: rgb

methods:
  - name: lora_split_qkv_r8
    adapter: zero_pad
    peft: lora_split_qkv
    rank: 8

training:
  lr: 1.0e-3
  lr_peft: 1.0e-4
  scheduler: cosine
  weight_decay: 0.01

prithvi:
  pretrained: true
  checkpoint: null
