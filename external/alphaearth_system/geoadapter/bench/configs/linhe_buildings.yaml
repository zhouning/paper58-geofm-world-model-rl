experiment:
  name: linhe_buildings_synth_baseline
  task: segmentation
  dataset: linhe_buildings
  dataset_root: .
  num_classes: 2
  epochs: 30
  batch_size: 16
  seeds: [42, 123, 456]
  split_mode: patch             # synth label 无跨 scene 泛化意义, patch-level 更公平
  positive_min_share: 0.05      # synth threshold=140 → 保留建筑密度 ≥5% 的 patch
  max_samples: 2000
  val_max_samples: 400

modalities:
  - preset: rgb_3band

methods:
  - name: linear_probe
    adapter: zero_pad
    peft: null
  - name: houlsby
    adapter: zero_pad
    peft: houlsby
    bottleneck_dim: 64

training:
  lr: 1.0e-3
  lr_peft: 1.0e-4
  scheduler: cosine
  weight_decay: 0.01
  # Synth label (brightness threshold=140) 与 RGB 强相关, 模型能学到
  # 0.70 mIoU (houlsby). 不需要 focal/class_weights — 正样本占比
  # 已通过 positive_min_share=0.05 保证 ≥5%.
  loss: ce

prithvi:
  pretrained: true
  checkpoint: data/weights/prithvi/Prithvi_100M.pt
