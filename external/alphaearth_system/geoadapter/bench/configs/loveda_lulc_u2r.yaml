experiment:
  name: loveda_lulc_u2r
  task: segmentation
  dataset: loveda
  dataset_root: data/weights/raw_data/loveda
  num_classes: 7
  epochs: 30
  batch_size: 16
  seeds: [42, 123, 456]
  split_mode: cross_domain
  train_domain: urban
  val_domain: rural
  positive_min_share: 0.0

modalities:
  - preset: rgb_3band

methods:
  - name: linear_probe
    adapter: zero_pad
    peft: null
  - name: bitfit
    adapter: zero_pad
    peft: bitfit
  - name: lora_r8
    adapter: zero_pad
    peft: lora
    rank: 8
  - name: houlsby
    adapter: zero_pad
    peft: houlsby
    bottleneck_dim: 64
  - name: geoadapter
    adapter: geo_adapter
    peft: null

training:
  lr: 1.0e-3
  lr_peft: 1.0e-4
  scheduler: cosine
  weight_decay: 0.01
  loss: ce

prithvi:
  pretrained: true
  checkpoint: data/weights/prithvi/Prithvi_100M.pt
